# Render Blueprint — deploy from repo with rootDir = server (or link this file).
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: agentos-api
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
