<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#F5F3F0" media="(prefers-color-scheme: light)" />
    <meta
      name="description"
      content="AgentOX orchestrates Product, Engineering, and QA agents from Jira ticket to shipped code — with validation gates at every handoff."
    />
    <title>AgentOX — From Jira Ticket to Shipped Code</title>

    <!-- Establish early connections to font CDN -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- App shell fonts: Inter · Cormorant Garamond · JetBrains Mono -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap"
    />

    <!-- Marketing fonts: Space Grotesk · IBM Plex Sans · IBM Plex Mono -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
    />
  </head>
  <body>
    <style>
      #root:not(.app-ready) {
        visibility: hidden;
      }
      #app-initial-loader {
        position: fixed;
        inset: 0;
        z-index: 10000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.25rem;
        background: #080810;
      }
      #app-initial-loader .loader {
        width: 40px;
        height: 20px;
        --c: no-repeat radial-gradient(farthest-side, #f0eee8 93%, #0000);
        background: var(--c) 0 0, var(--c) 50% 0;
        background-size: 8px 8px;
        position: relative;
        clip-path: inset(-200% -100% 0 0);
        animation: boot-l6-0 1.5s linear infinite;
      }
      #app-initial-loader .loader::before {
        content: "";
        position: absolute;
        width: 8px;
        height: 12px;
        background: #f0eee8;
        left: -16px;
        top: 0;
        animation: boot-l6-1 1.5s linear infinite, boot-l6-2 0.5s cubic-bezier(0, 200, 0.8, 200) infinite;
      }
      #app-initial-loader .loader::after {
        content: "";
        position: absolute;
        inset: 0 0 auto auto;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #f0eee8;
        animation: boot-l6-3 1.5s linear infinite;
      }
      @keyframes boot-l6-0 {
        0%, 30% { background-position: 0 0, 50% 0; }
        33% { background-position: 0 100%, 50% 0; }
        41%, 63% { background-position: 0 0, 50% 0; }
        66% { background-position: 0 0, 50% 100%; }
        74%, 100% { background-position: 0 0, 50% 0; }
      }
      @keyframes boot-l6-1 {
        90% { transform: translateY(0); }
        95% { transform: translateY(15px); }
        100% { transform: translateY(15px); left: calc(100% - 8px); }
      }
      @keyframes boot-l6-2 { 100% { top: -0.1px; } }
      @keyframes boot-l6-3 {
        0%, 80%, 100% { transform: translate(0); }
        90% { transform: translate(26px); }
      }
    </style>
    <div id="app-initial-loader" aria-live="polite" aria-busy="true">
      <div class="loader" role="status" aria-label="Loading Agentos"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
